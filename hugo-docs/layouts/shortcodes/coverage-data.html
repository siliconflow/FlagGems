<h2>Coverage data</h2>

<table class="sortable-table">
    <caption style="display:none">
        {{- .Get "caption" -}}
    </caption>
    <tbody>
    {{- range $dir := os.ReadDir "static/coverage" -}}
      {{ $href := printf "/FlagGems/coverage/%s/" $dir.Name }}
        <tr>
          <td><a href="{{ $href }}" target="_self">{{ $dir.Name }}</a></td>
      </tr>
    {{- end -}}
</tbody>
</table>
